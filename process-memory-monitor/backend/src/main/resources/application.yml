server:
  port: 8080

spring:
  application:
    name: process-memory-monitor

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/process_monitor?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASS:}
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

monitor:
  alert:
    memory-percent-threshold: 5
  schedule:
    cron: "0 */1 * * * ?"
  redis:
    enabled: true
    key-prefix: "process:monitor:"
    expire-seconds: 300
